services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # 反代下让 express 正确识别 https
      - NODE_ENV=production
    volumes:
      # 持久化订单/房间数据
      - ./data:/app/data
    expose:
      - "8787"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      # 你的域名，例如 example.com
      - DOMAIN=${DOMAIN}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
